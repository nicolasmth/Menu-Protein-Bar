      const entry = manifest[uuid];

    // would push the parser into quirks mode. DOMParser always emits a <head>

    console.error('Bundle unpack error:', err);

ay';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"012828f2-82de-4ea9-8232-c3dbfdd5d126\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"4f1111a8-123d-4264-898a-fc294625a96e\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"761139ae-5e25-4382-aaa5-a31b53711287\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"4f7d5e80-9e70-4e52-b180-93f6fdb7769c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"423dbc56-db29-4da1-a91d-6d2c9d091596\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"012828f2-82de-4ea9-8232-c3dbfdd5d126\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- BRAND PALETTE (Protein Bar) ---------- */\n  --eggshell:      #FAF3DD;   /* primary background */\n  --pale-dessert:  #F0D3BC;   /* secondary background, soft surface */\n  --black-olive:   #3B3B3B;   /* primary text, ink */\n  --persimmon:     #F65009;   /* accent, CTAs, highlights */\n\n  /* Tonal extensions (derived for UI scale, kept restrained) */\n  --eggshell-deep: #F4EBCD;   /* hover/pressed eggshell */\n  --pale-dessert-deep: #E6C0A0;\n  --olive-soft:    #5C5A55;   /* secondary text */\n  --olive-muted:   #8A877F;   /* tertiary text, captions */\n  --olive-line:    rgba(59, 59, 59, 0.14); /* hairlines, dividers */\n  --olive-line-strong: rgba(59, 59, 59, 0.28);\n  --persimmon-deep:#D44307;   /* persimmon hover/press */\n  --persimmon-soft:#FBE0CF;   /* persimmon tint, badge bg */\n\n  /* ---------- SEMANTIC COLOR TOKENS ---------- */\n  --bg:            var(--eggshell);\n  --bg-alt:        var(--pale-dessert);\n  --surface:       #FFFFFF;\n  --fg:            var(--black-olive);\n  --fg-1:          var(--black-olive);\n  --fg-2:          var(--olive-soft);\n  --fg-3:          var(--olive-muted);\n  --accent:        var(--persimmon);\n  --accent-fg:     var(--eggshell);\n  --line:          var(--olive-line);\n  --line-strong:   var(--olive-line-strong);\n\n  /* ---------- TYPOGRAPHY — FAMILIES ---------- */\n  --font-display:  'Raleway', 'Helvetica Neue', Arial, sans-serif;\n  --font-body:     'Krub', 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:     ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* ---------- TYPE SCALE ---------- */\n  --fs-display:    clamp(56px, 9vw, 140px);\n  --fs-h1:         clamp(40px, 5.4vw, 72px);\n  --fs-h2:         clamp(32px, 3.6vw, 52px);\n  --fs-h3:         28px;\n  --fs-h4:         22px;\n  --fs-lead:       20px;\n  --fs-body:       16px;\n  --fs-small:      14px;\n  --fs-eyebrow:    12px;\n\n  --lh-display:    0.92;\n  --lh-heading:    1.05;\n  --lh-body:       1.55;\n  --lh-tight:      1.2;\n\n  --tracking-display: -0.02em;\n  --tracking-heading: -0.01em;\n  --tracking-eyebrow: 0.18em;\n  --tracking-button:  0.08em;\n\n  /* ---------- SPACING (8pt grid) ---------- */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 24px;\n  --s-6: 32px;\n  --s-7: 48px;\n  --s-8: 64px;\n  --s-9: 96px;\n  --s-10: 128px;\n\n  /* ---------- RADII ---------- */\n  --r-xs: 2px;\n  --r-sm: 4px;\n  --r-md: 8px;\n  --r-lg: 16px;\n  --r-pill: 999px;\n\n  /* ---------- SHADOWS (restrained — minimalist) ---------- */\n  --shadow-1: 0 1px 2px rgba(59,59,59,0.04), 0 2px 6px rgba(59,59,59,0.04);\n  --shadow-2: 0 2px 8px rgba(59,59,59,0.06), 0 12px 32px rgba(59,59,59,0.06);\n  --shadow-cta: 0 6px 18px rgba(246, 80, 9, 0.22);\n\n  /* ---------- MOTION ---------- */\n  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --dur-fast: 140ms;\n  --dur-base: 240ms;\n  --dur-slow: 420ms;\n}\n\n/* ---------- BASE ---------- */\nhtml, body {\n  background: var(--bg);\n  color: var(--fg);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  font-weight: 400;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- HEADINGS ---------- */\nh1, .h1, h2, .h2, h3, .h3, h4, .h4, .display, .eyebrow {\n  font-family: var(--font-display);\n  color: var(--fg-1);\n  margin: 0;\n  text-wrap: balance;\n}\n\n.display {\n  font-size: var(--fs-display);\n  font-weight: 900;\n  line-height: var(--lh-display);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n}\nh1, .h1 {\n  font-size: var(--fs-h1);\n  font-weight: 900;\n  line-height: var(--lh-heading);\n  letter-spacing: var(--tracking-heading);\n  text-transform: uppercase;\n}\nh2, .h2 {\n  font-size: var(--fs-h2);\n  font-weight: 800;\n  line-height: var(--lh-heading);\n  letter-spacing: var(--tracking-heading);\n  text-transform: uppercase;\n}\nh3, .h3 {\n  font-size: var(--fs-h3);\n  font-weight: 700;\n  line-height: 1.15;\n  text-transform: uppercase;\n  letter-spacing: 0;\n}\nh4, .h4 {\n  font-size: var(--fs-h4);\n  font-weight: 600;\n  line-height: 1.25;\n}\n\n.eyebrow {\n  font-size: var(--fs-eyebrow);\n  font-weight: 600;\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--fg-2);\n}\n\n/* ---------- BODY TEXT ---------- */\np, .p { margin: 0; }\n.lead {\n  font-size: var(--fs-lead);\n  line-height: 1.45;\n  color: var(--fg-1);\n}\n.body  { font-size: var(--fs-body); line-height: var(--lh-body); }\n.small { font-size: var(--fs-small); line-height: 1.5; color: var(--fg-2); }\n.caption { font-size: var(--fs-small); color: var(--fg-3); }\n\n/* Mono — used sparingly for code, prices in tables */\n.mono { font-family: var(--font-mono); font-size: 13px; }\n\n/* Selection */\n::selection { background: var(--persimmon); color: var(--eggshell); }\n\n\n/* ====== Page chrome ====== */\n* { box-sizing: border-box; }\nbody { margin: 0; }\n.menu-shell {\n  max-width: 1240px;\n  margin: 0 auto;\n  padding: 0 clamp(20px, 5vw, 64px);\n}\n\n/* ====== Top bar ====== */\n.topbar {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 28px 0 24px;\n  border-bottom: 1px solid var(--line);\n  position: sticky;\n  top: 0;\n  background: var(--bg);\n  z-index: 20;\n}\n.topbar .brand img { height: 28px; display: block; }\n.topbar .meta {\n  display: flex;\n  gap: 28px;\n  align-items: center;\n  font-size: 12px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--fg-2);\n  font-weight: 500;\n}\n.topbar .meta .dot { width: 6px; height: 6px; background: var(--persimmon); border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }\n.topbar .hours {\n  position: relative;\n  cursor: default;\n}\n.topbar .hours summary {\n  list-style: none;\n  cursor: pointer;\n  outline: none;\n}\n.topbar .hours summary::-webkit-details-marker { display: none; }\n.topbar .hours summary::after {\n  content: '↓';\n  margin-left: 8px;\n  font-size: 10px;\n  opacity: 0.6;\n  transition: transform var(--dur-fast) var(--ease-out);\n  display: inline-block;\n}\n.topbar .hours[open] summary::after { transform: rotate(180deg); }\n.topbar .hours-panel {\n  position: absolute;\n  top: calc(100% + 14px);\n  right: 0;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-md);\n  padding: 18px 22px;\n  min-width: 260px;\n  box-shadow: var(--shadow-2);\n  display: grid;\n  gap: 10px;\n  z-index: 30;\n}\n.topbar .hours-panel .row {\n  display: flex;\n  justify-content: space-between;\n  gap: 18px;\n  font-size: 12px;\n  letter-spacing: 0.06em;\n  text-transform: none;\n  color: var(--fg-2);\n}\n.topbar .hours-panel .row .day {\n  font-family: var(--font-display);\n  font-weight: 600;\n  color: var(--fg-1);\n  text-transform: lowercase;\n  letter-spacing: 0;\n}\n.topbar .hours-panel .row .time {\n  font-variant-numeric: tabular-nums;\n  color: var(--fg-1);\n}\n\n/* ====== Hero ====== */\n.hero {\n  padding: clamp(56px, 11vw, 140px) 0 clamp(48px, 9vw, 110px);\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 32px;\n}\n.hero .eyebrow-row {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  gap: 24px;\n  flex-wrap: wrap;\n}\n.hero h1.display {\n  font-size: clamp(72px, 16vw, 220px);\n  font-weight: 900;\n  line-height: 0.88;\n  letter-spacing: -0.03em;\n  text-transform: lowercase;\n  margin-top: 24px;\n}\n.hero h1.display em {\n  font-style: italic;\n  color: var(--persimmon);\n  font-weight: 900;\n}\n.hero .lede {\n  max-width: 540px;\n  margin-top: 28px;\n  color: var(--fg-2);\n  font-size: 17px;\n  line-height: 1.6;\n}\n.hero .scroll-cue {\n  margin-top: 56px;\n  display: inline-flex;\n  align-items: center;\n  gap: 14px;\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--fg-2);\n}\n.hero .scroll-cue .line { width: 56px; height: 1px; background: var(--olive-line-strong); }\n\n/* ====== Section index (sticky tabs) ====== */\n.section-index {\n  position: sticky;\n  top: 81px;\n  background: var(--bg);\n  z-index: 15;\n  padding: 18px 0;\n  border-bottom: 1px solid var(--line);\n  overflow-x: auto;\n  scrollbar-width: none;\n}\n.section-index::-webkit-scrollbar { display: none; }\n.section-index ul {\n  list-style: none;\n  display: flex;\n  gap: 8px;\n  margin: 0;\n  padding: 0;\n  white-space: nowrap;\n}\n.section-index a {\n  display: inline-block;\n  padding: 8px 14px;\n  border-radius: var(--r-pill);\n  font-size: 13px;\n  letter-spacing: 0.04em;\n  color: var(--fg-2);\n  text-decoration: none;\n  border: 1px solid transparent;\n  transition: all var(--dur-fast) var(--ease-out);\n}\n.section-index a:hover {\n  color: var(--fg-1);\n  border-color: var(--olive-line-strong);\n}\n.section-index a.is-active {\n  background: var(--black-olive);\n  color: var(--eggshell);\n}\n\n/* ====== Section header (hero-style separator) ====== */\n.sec {\n  padding: clamp(72px, 11vw, 140px) 0 clamp(40px, 6vw, 80px);\n  scroll-margin-top: 140px;\n}\n.sec-head {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 18px;\n  margin-bottom: clamp(40px, 6vw, 72px);\n  border-top: 1px solid var(--olive-line-strong);\n  padding-top: 32px;\n}\n.sec-head .meta-row {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  gap: 24px;\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--fg-2);\n}\n.sec-head h2 {\n  font-size: clamp(56px, 10vw, 132px);\n  font-weight: 900;\n  line-height: 0.92;\n  letter-spacing: -0.025em;\n  text-transform: lowercase;\n  margin: 12px 0 0;\n}\n.sec-head .note {\n  margin-top: 18px;\n  max-width: 580px;\n  color: var(--fg-2);\n  font-size: 15px;\n  line-height: 1.55;\n  font-style: italic;\n}\n.sec-head .note strong { color: var(--fg-1); font-style: normal; font-weight: 600; }\n\n/* ====== Menu rows ====== */\n.menu-list {\n  display: grid;\n  grid-template-columns: 1fr;\n}\n.menu-row {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: baseline;\n  gap: 24px;\n  padding: 22px 0;\n  border-bottom: 1px solid var(--line);\n}\n.menu-row:last-child { border-bottom: none; }\n.menu-row .name {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 22px;\n  letter-spacing: -0.005em;\n  color: var(--fg-1);\n  text-transform: lowercase;\n}\n.menu-row .desc {\n  margin-top: 6px;\n  color: var(--fg-2);\n  font-size: 14px;\n  line-height: 1.5;\n  max-width: 580px;\n}\n.menu-row .price {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 18px;\n  color: var(--fg-1);\n  white-space: nowrap;\n  font-variant-numeric: tabular-nums;\n}\n.menu-row .price.tbd {\n  font-style: italic;\n  font-weight: 400;\n  color: var(--fg-3);\n  font-size: 14px;\n  letter-spacing: 0.04em;\n}\n.menu-row .tags {\n  display: inline-flex;\n  gap: 6px;\n  margin-left: 10px;\n  vertical-align: middle;\n}\n.menu-row .tag {\n  display: inline-block;\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--persimmon);\n  border: 1px solid var(--persimmon);\n  padding: 3px 7px;\n  border-radius: var(--r-pill);\n  vertical-align: middle;\n}\n.menu-row .tag.olive {\n  color: var(--fg-2);\n  border-color: var(--olive-line-strong);\n}\n\n/* ====== Build your own (chips) ====== */\n.byo {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 0;\n}\n.byo-summary {\n  margin-top: 56px;\n  background: var(--pale-dessert);\n  border-radius: var(--r-lg);\n  padding: 36px clamp(24px, 4vw, 48px);\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 24px;\n}\n@media (min-width: 880px) {\n  .byo-summary { grid-template-columns: 1fr auto; align-items: end; gap: 48px; }\n  .byo-summary .summary-list { grid-column: 1; }\n  .byo-summary .tota AAAAAdOI8Io6/8fWTR77+LcfD92/qJCKOnvH9AAAAAAA79/+COFG/BQ3FaAAAAABJRU5ErkJggg==\" alt=\"Mitho\" class=\"badge\">\n    <div class=\"colofon\">\n      <div class=\"row\"><span>protein bar<\u002Fspan><span>bogotá<\u002Fspan><span>@mithowellnessclub<\u002Fspan><\u002Fdiv>\n      <div class=\"row\" style=\"color:var(--fg-3);letter-spacing:.06em;text-transform:none;font-size:12px;\">precios incluyen iva. propina voluntaria 10%. carta sujeta a cambios.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<script>\n  // Section nav active state\n  const navLinks = document.querySelectorAll('#secNav a');\n  const sections = [...document.querySelectorAll('.sec')];\n  const setActive = (id) => navLinks.forEach(a => a.classList.toggle('is-active', a.getAttribute('href') === '#' + id));\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });\n  }, { rootMargin: '-30% 0px -60% 0px' });\n  sections.forEach(s => io.observe(s));\n\n  // Build your own — chips (sándwich)\n  const state = { base: null, protein: null, veggies: [], sauce: null };\n\n  document.querySelectorAll('.byo-step').forEach(stepEl => {\n    const step = stepEl.dataset.step;\n    const mode = stepEl.dataset.mode;\n    const max = parseInt(stepEl.dataset.max || '1', 10);\n    stepEl.querySelectorAll('.chip').forEach(chip => {\n      chip.addEventListener('click', () => {\n        const name = chip.dataset.name;\n        if (mode === 'single') {\n          stepEl.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));\n          chip.setAttribute('aria-pressed', 'true');\n          state[step] = { name };\n        } else {\n          const isOn = chip.getAttribute('aria-pressed') === 'true';\n          if (isOn) {\n            chip.setAttribute('aria-pressed', 'false');\n            state[step] = state[step].filter(x => x.name !== name);\n          } else {\n            if (state[step].length >= max) return;\n            chip.setAttribute('aria-pressed', 'true');\n            state[step].push({ name });\n          }\n        }\n        render();\n      });\n    });\n  });\n\n  function render() {\n    const setSlot = (k, txt) => document.querySelector('[data-slot=\"' + k + '\"]').textContent = txt;\n    setSlot('base', state.base ? state.base.name : '—');\n    setSlot('protein', state.protein ? state.protein.name : '—');\n    setSlot('veggies', state.veggies.length ? state.veggies.map(t=>t.name).join(' · ') : '—');\n    setSlot('sauce', state.sauce ? state.sauce.name : '—');\n  }\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
